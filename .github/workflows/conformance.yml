name: Conformance

on:
  pull_request:
  push:
    branches: [main]

jobs:
  fast-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Expose python3.14 alias
        run: |
          if ! command -v python3.14 &> /dev/null; then
            sudo ln -sf $(which python) /usr/local/bin/python3.14
          fi
      - name: Fast gate
        run: bash scripts/gate.sh fast
      - name: Fuzz smoke
        run: cargo run -p pon-conformance -- --suite fuzz --seed 42 --count 50 --jobs 4

  cpython-full-floor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Expose python3.14 alias
        run: |
          if ! command -v python3.14 &> /dev/null; then
            sudo ln -sf $(which python) /usr/local/bin/python3.14
          fi
      - name: CPython full floor
        run: cargo run -p pon-conformance -- --suite cpython-full --check-floor --jobs 4

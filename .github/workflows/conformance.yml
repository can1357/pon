name: Conformance

on:
  pull_request:
  push:
    branches: [main]

jobs:
  phase-b-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Phase A slice corpus
        run: cargo run -p pon-conformance -- --suite slice
      - name: Phase B CPython floor
        run: cargo run -p pon-conformance -- --suite cpython --check-floor
      - name: Phase C AoT subset
        run: cargo run -p pon-conformance -- --mode aot --suite cpython-aot-subset --check-floor
